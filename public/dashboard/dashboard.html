<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Planner App</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-content">
                <h1>Planner App</h1>
                <p>Organize your tasks and manage your time efficiently</p>
            </div>
            <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Create Task Section -->
            <div class="create-task-section">
                <h2>Create Task</h2>
                <div id="feedback" class="feedback"></div>
                <form id="createTaskForm">
                    <div class="form-group">
                        <label for="taskTitle">Task Title:</label>
                        <input type="text" id="taskTitle" name="title" required>
                    </div>

                    <div class="form-group">
                        <label>Task Type:</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" id="taskTypeOneTime" name="taskType" value="ONE_TIME" required checked>
                                <span class="radio-custom"></span>
                                One-Time
                            </label>
                            <label class="radio-label">
                                <input type="radio" id="taskTypeRecurring" name="taskType" value="RECURRING" required>
                                <span class="radio-custom"></span>
                                Recurring
                            </label>
                        </div>
                    </div>

                    <div class="form-group" id="oneTimeGroup">
                        <label for="taskDate">Date:</label>
                        <input type="date" id="taskDate" name="date">
                    </div>

                    <div class="form-group" id="recurringDaysGroup" style="display: none;">
                        <label>Days of Week:</label>
                        <div class="days-selector">
                            <label class="day-checkbox"><input type="checkbox" name="days" value="MONDAY"> Monday</label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="TUESDAY"> Tuesday</label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="WEDNESDAY"> Wednesday</label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="THURSDAY"> Thursday</label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="FRIDAY"> Friday</label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="SATURDAY"> Saturday</label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="SUNDAY"> Sunday</label>
                        </div>
                    </div>

                    <div class="form-group" id="recurringTimeGroup" style="display: none;">
                        <label>Time:</label>
                        <div class="time-selector">
                            <div class="time-input-group">
                                <input type="number" id="taskHour" name="hour" min="1" max="12" value="1" placeholder="Hour">
                                <span class="time-colon">:</span>
                                <input type="number" id="taskMinute" name="minute" min="0" max="59" value="30" placeholder="00">
                            </div>
                            <div class="ampm-toggle">
                                <input type="radio" id="amToggle" name="ampm" value="AM">
                                <label for="amToggle">AM</label>
                                <input type="radio" id="pmToggle" name="ampm" value="PM" checked>
                                <label for="pmToggle">PM</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="taskDescription">Description:</label>
                        <textarea id="taskDescription" name="description" placeholder="Add task details..."></textarea>
                    </div>

                    <button type="submit" class="create-task-btn">Create Task</button>
                </form>
            </div>

            <!-- Tasks Display Section -->
            <div class="tasks-section">
                <h2>Your Tasks</h2>
                <div id="tasksList" class="tasks-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>No tasks yet</p>
                        <p style="font-size: 12px; color: #ccc;">Create your first task to get started</p>
                    </div>
                </div>
            </div>

            <!-- Calendar Section -->
            <div class="calendar-section">
                <h2>Calendar</h2>
                <div class="calendar-header">
                    <button id="prevMonth" class="calendar-nav-btn">←</button>
                    <h3 id="currentMonth"></h3>
                    <button id="nextMonth" class="calendar-nav-btn">→</button>
                </div>
                <div id="calendar" class="calendar-grid"></div>
                <div id="calendarEvents" class="calendar-events"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/dist/public/dashboard/dashboard.js"></script>
</body>

</html>
