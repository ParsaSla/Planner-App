<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner App - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Planner App</h1>
            <p>Organize your tasks and manage your time efficiently</p>
        </div>
        <div class="login-content">
            <form id="authForm" method="post">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="confirm-password-group form-group" id="confirmPasswordGroup">
                    <label for="confirmPassword" id="confirmPasswordLabel">Confirm Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword">
                </div>

                <input type="submit" value="Login" id="submitBtn">
            </form>

            <button id="toggleBtn" class="toggle-btn" type="button">No account? Register</button>

            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <script type="module" src="/dist/public/login/login.js"></script>
</body>
</html>
