<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Planner App</h1>
    <p>This is a simple planner application.</p>   
    <form id="authForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <label for="confirmPassword" id="confirmPasswordLabel" style="display: none;">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" style="display: none;"><br><br>
        <input type="submit" value="Login" id="submitBtn">
    </form>
    <button id="toggleBtn" type="button">No account? Register</button>
    <p id="feedback" style="color: red;">hello</p>

    <script type="module" src="/dist/public/login/login.js"></script>
</body>
</html>
